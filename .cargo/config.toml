[build]
target = "riscv64imac-unknown-none-elf"

[alias]
dev = "run --features print_dtb"

[target.riscv64imac-unknown-none-elf]
#runner = "qemu-system-riscv64 -machine virt -nographic -bios default -m 256M -S -gdb tcp::1234 -kernel"
runner = "qemu-system-riscv64 -machine virt -nographic -bios default -m 256M -kernel"
rustflags = ["-C", "link-arg=-Tlink.ld"]

[unstable]
build-std = ["core", "compiler_builtins"]

