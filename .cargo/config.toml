[build]
target = "riscv64imac-unknown-none-elf"

[alias]
dev = "run --features print_dtb"

[target.riscv64imac-unknown-none-elf]
runner = "qemu-system-riscv64 -machine virt -nographic -bios default -initrd target/riscv64imac-unknown-none-elf/debug/initramfs.cpio -m 256M -kernel"
rustflags = ["-C", "link-arg=-Tlink.ld"]
linker = "riscv64-unknown-elf-ld"

[unstable]
build-std = ["core", "compiler_builtins"]

