name: Build and Push RISC-V Musl Toolchain

on:
  workflow_dispatch:

env:
  IMAGE_NAME: riscv-musl-toolchain
  GHCR_REGISTRY: ghcr.io
  GHCR_USERNAME: ${{ github.actor }}
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/riscv-musl-toolchain

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./prog_example
          push: true
          tags: ${{ env.GHCR_IMAGE }}:latest

      - name: Save image as archive (optional)
        run: |
          docker pull $GHCR_IMAGE:latest
          docker save $GHCR_IMAGE:latest | gzip > $IMAGE_NAME.tar.gz

      - name: Upload image artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}
          path: ${{ env.IMAGE_NAME }}.tar.gz
